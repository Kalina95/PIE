<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpDeskHero</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="HelpDeskHero.UI.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <div class="app-loading-spinner" role="status" aria-label="Ładowanie"></div>
            <div class="app-loading-text">Ładowanie aplikacji…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        <div class="blazor-error-inner">
            <span class="blazor-error-title">Wystąpił nieoczekiwany błąd.</span>
            <span>Możesz odświeżyć stronę lub spróbować ponownie później.</span>
            <a href="." class="reload">Odśwież stronę</a>
            <button type="button" class="dismiss" aria-label="Zamknij">✕</button>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/download.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
