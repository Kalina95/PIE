# HelpDeskHero: SQL Server + API + Blazor UI (nginx).
# Uruchomienie: docker compose up --build
# UI: http://localhost:8888  API/Swagger: http://localhost:5000/swagger
# Konto seed (jak w SeedData): admin / Admin1234
#
# RabbitMQ (narzędzia load/worker): docker compose --profile tools up -d rabbitmq

name: helpdeskhero

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-HdH_Docker_2024!}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 25
      start_period: 50s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    platform: linux/amd64
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sql;Database=HelpDeskHero;User Id=sa;Password=${SQL_SA_PASSWORD:-HdH_Docker_2024!};TrustServerCertificate=True;Encrypt=Optional"
      Jwt__Issuer: HelpDeskHero
      Jwt__Audience: HelpDeskHero.UI
      Jwt__Key: "${JWT_KEY:-HdH_LOCAL_DOCKER_JWT_KEY_AT_LEAST_32_CHARACTERS!}"
      Jwt__AccessTokenMinutes: "15"
      Jwt__RefreshTokenDays: "7"
      Cors__Origins__0: "http://localhost:${UI_PORT:-8888}"
      Cors__Origins__1: "http://127.0.0.1:${UI_PORT:-8888}"
      FileStorage__RootPath: /app/storage
    volumes:
      - api-storage:/app/storage
    depends_on:
      sql:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
    platform: linux/amd64
    ports:
      - "${UI_PORT:-8888}:80"
    environment:
      API_PUBLIC_URL: "${API_PUBLIC_URL:-http://localhost:5000}"
    depends_on:
      - api

  rabbitmq:
    profiles:
      - tools
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hdh
      RABBITMQ_DEFAULT_PASS: hdh

volumes:
  sql-data:
  api-storage:
